- title: "Přednáška Jana Láníčka | Přeživší holokaustu a poválečná retribuce"
  url: /news/lecture-jan-lanicek/
  date: 1. června 2026, 18.00
  content: |
    Zveme Vás na přednášku Jana Láníčka z cyklu Směry současného výzkumu holokaustu, který pořádá EHRI-CZ ve spolupráci s Židovským muzeem v Praze.

- title: "Český uzel EHRI přivítá první letošní stipendistku programu EHRI-ERIC Conny Kristel Fellowship"
  url: /news/ehri-eric-conny-kristel-fellowship-leonie-rogg/
  content: |
    Leonie Rogg zahájí svůj výzkumný pobyt v pondělí 27. května v Archivu Židovského muzea v Praze. V červnu bude pokračovat studiem v Národním archivu.

- title: "Conny Kristel Fellowship"
  url: https://www.ehri-project.eu/conny-kristel-fellowships/
  content: |
    Bylo vyhlášeno druhé kolo výzvy Conny Kristel Fellowship (v rámci EHRI-ERIC). Toto stipendium nabízí badatelům přístup do 25 paměťových a výzkumných institucí napříč Evropou, Izraelem a USA. Přihlášky je možné podávat do 7. června (do půlnoci SEČ).

- title: "Komentovaná procházka s MemoMap na Praze 7"
  url: /news/guided-walk-memomap-prague-7/
  date: 19. 5. 2026, 16.00
  content: |
    Vydejte se s námi na procházku po Praze 7, během níž vás seznámíme s aplikací [MemoMap Praha](https://memomap.cz). Procházka je bezplatná, sraz u hotelu Mama Shelter.

- title: Národní archiv zveřejňuje první část databáze přeživších šoa z Prahy
  url: https://www.nacr.cz/vyzkum/databaze-prezivsich-z-prahy
  content: |
    Projekt s názvem Album přeživších šoa z Prahy dokumentuje osoby, které byly v letech 1941–1944 deportovány hromadnými transporty z Prahy do Terezína a dalších koncentračních táborů a přežily holokaust.

