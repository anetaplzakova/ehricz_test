- title: "Komentovaná procházka s MemoMap na Praze 7"
  url: /news/guided-walk-memomap-prague-7/
  date: 19. 5. 2026, 16.00
  content: |
    Vydejte se s námi na procházku po Praze 7, během níž vás seznámíme s aplikací [MemoMap Praha](https://memomap.cz). Procházka je bezplatná, sraz u hotelu Mama Shelter.

- title: "Strategy Days EHRI-ERIC v Praze"
  url: /news/strategy-days-ehri-eric/
  content: |
    Ve dnech 23.–25. března 2026 proběhlo v MÚA setkání EHRI-ERIC. Diskutovalo se o budoucím směřování infrastruktury v oblasti výzkumu, sdílení dat i udržitelnosti.

- title: "EHRI Document Blog | Norwegian Digital Prisoner Archive 1940-1945, Fanger.no: A Database on WWII Captivity"
  url: /news/ehri-blog-norwegian-archive/
  content: |
    Na Dokumentovém blogu EHRI vyšel nový článek o Norském digitálním archivu válečných zajatců 1940–1945 Fanger, který obsahuje údaje o téměř 50 000 osobách.

- title: "Výstava v Malém Mehrinu | Otte Wallish: Ze Znojma do Tel Avivu"
  url: /news/vystava-otte-wallish/
  date: 30. 3. 2026, 18.00
  content: |
    V muzeu Malý Mehrin proběhne vernisáž výstavy Evy Janáčové Otte Wallish: Ze Znojma do Tel Avivu, která představuje tvorbu významného izraelského grafika pocházejícího ze Znojma. Výstava bude k vidění do konce srpna 2026.

- title: Národní archiv zveřejňuje první část databáze přeživších šoa z Prahy
  url: https://www.nacr.cz/vyzkum/databaze-prezivsich-z-prahy
  content: |
    Projekt s názvem Album přeživších šoa z Prahy dokumentuje osoby, které byly v letech 1941–1944 deportovány hromadnými transporty z Prahy do Terezína a dalších koncentračních táborů a přežily holokaust.

