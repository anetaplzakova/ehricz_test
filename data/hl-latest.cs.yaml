- title: "Přednáška Laura Hobson Faure | Who Will Rescue Us?"
  url: /news/lecture-laura-hobson-faure/
  date: 24. června 2026, 17.00
  content: |
    Přijďte si poslechnout přednášku historičky Laury Hobson Faure o osudech židovských dětí ve Francii a Spojených státech během holokaustu a po jeho skončení.

- title: "MÚA na Veletrhu vědy 2026"
  url: /news/mua-na-veletrhu-vedy-2026/
  date: 4.–6. června 2026
  content: |
    Poznejte historii holokaustu skrze prostor města na Veletrhu vědy 2026. Masarykův ústav a Archiv AV ČR představí aplikace MemoMap a další edukační aktivity pro děti i dospělé.

- title: "EHRI webinář: EHRI-CZ Portal: Integrating Holocaust-Related Data Across Institutions"
  url: /news/webinar-ehri-cz-portal/
  date: 17. června 2026, 15.00
  content: |
    V rámci online EHRI webináře představí Aneta Plzáková a Maria Dermentzi aktuální stav vývoje Portálu EHRI-CZ. Portál propojuje data o holokaustu z různých institucí a řeší výzvy spojené s vícejazyčností a metadatovými standardy.

- title: "Workshop k 3. výročí C4DHI"
  url: /news/c4dhi-anniversary-workshop/
  date: 1.–2. června 2026
  content: |
    Zveme Vás na dvoudenní workshop pořádaný u příležitosti třetího výročí založení Centra pro integraci digitálních humanitních věd (C4DHI). Akce se uskuteční v areálu Jinonice Campus.

- title: "Přednáška Jana Láníčka | Přeživší holokaustu a poválečná retribuce"
  url: /news/lecture-jan-lanicek/
  date: 1. června 2026, 18.00
  content: |
    Zveme Vás na přednášku Jana Láníčka z cyklu Směry současného výzkumu holokaustu, který pořádá EHRI-CZ ve spolupráci s Židovským muzeem v Praze.

- title: "Conny Kristel Fellowship"
  url: https://www.ehri-project.eu/conny-kristel-fellowships/
  content: |
    Bylo vyhlášeno druhé kolo výzvy Conny Kristel Fellowship (v rámci EHRI-ERIC). Toto stipendium nabízí badatelům přístup do 25 paměťových a výzkumných institucí napříč Evropou, Izraelem a USA. Přihlášky je možné podávat do 7. června (do půlnoci SEČ).