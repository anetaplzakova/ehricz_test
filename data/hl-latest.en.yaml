- title: "Opening of the Exhibition Lives Cut Short and Presentation of the Ruth Maier Foundation"
  url: /en/news/ruth-maier-foundation/
  date: 7 May 2026, 10am, South Moravian Region, Office Foyer, Žerotínovo nám. 449/3, Brno
  content: |
    You are cordially invited to the opening of the exhibition "Lives Cut Short. Searching for Refuge during the Holocaust: The Story of Ruth Maier." The opening will include a round table discussion titled "The Price of Safety: Searching for Refuge Then and Now," as well as a presentation of the newly established Ruth Maier Foundation.

- title: "Guided Walk with MemoMap in Prague 7"
  url: /en/news/guided-walk-memomap-prague-7/
  date: 19 May 2026, 4pm
  content: |
    Join us for a walk through Prague 7, during which we will introduce you to the [MemoMap Prague](https://memomap.cz) application. The walk is free of charge, meeting point at Mama Shelter hotel.

- title: "EHRI Document Blog | Norwegian Digital Prisoner Archive 1940-1945, Fanger.no: A Database on WWII Captivity"
  url: /en/news/ehri-blog-norwegian-archive/
  content: |
    A new post has been published on the EHRI Document Blog about Norwegian Digital Prisoner Archive 1940–1945, which contains data on almost 50,000 individuals.

- title: "Exhibition at Little Mehrin | Otte Wallish: From Znojmo to Tel Avivu"
  url: /en/news/vystava-otte-wallish/
  date: 30 March 2026, 6pm
  content: |
    The Malý Mehrin Museum will host the opening of the exhibition Otte Wallish: From Znojmo to Tel Aviv prepared by Eva Janáčová. The exhibition will be on display until the end of August 2026.

- title: CfP | Workshop of EHRI-CZ and EHRI-AT
  url: /en/news/rethinking-holocaust-history-geospatial-approaches/
  date: 18–19 May 2026
  content: |
    Rethinking Holocaust History through Geospatial Approaches.

- title: Launch of the web applications MemoMap Pacov and MemoMap Říčany
  url: /en/news/memomap-pacov-ricany/
  content: |
    On the occasion of the International Holocaust Remembrance Day, the Czech node of the European Holocaust Research Infrastructure (EHRI-CZ), building on the MemoMap Prague project, presents two new interactive maps exploring the fates of the Jewish population during the period of the Protectorate of Bohemia and Moravia and beyond.
