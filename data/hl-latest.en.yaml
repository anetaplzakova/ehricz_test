- title: "EHRI-CZ Fellow Emily Roche: Building Survival: Experiences of Architect Prisoners at Auschwitz"
  url: /en/news/ehri-eric-conny-kristel-fellowship-emily-roche/
  content: |
    The second fellow to complete a fellowship at the Jewish Museum in Prague this June is Dr. Emily Julia Roche. Her research focuses on the topic Building Survival: Experiences of Architect Prisoners at Auschwitz.

- title: "Lecture Laura Hobson Faure | Who Will Rescue Us?"
  url: /en/news/lecture-laura-hobson-faure/
  date: 24 June 2026, 5pm
  content: |
    Join us for a lecture by historian Laura Hobson Faure on the fates of Jewish children in France and the United States during the Holocaust and its aftermath.

- title: "MÚA at the Science Fair 2026"
  url: /en/news/mua-na-veletrhu-vedy-2026/
  date: June 4–6, 2026
  content: |
    Explore the history of the Holocaust through urban space at the Science Fair 2026. The Masaryk Institute and Archives of the CAS will feature MemoMap applications and other educational activities for children and adults.

- title: "EHRI webinar: EHRI-CZ Portal: Integrating Holocaust-Related Data Across Institutions"
  url: /en/news/webinar-ehri-cz-portal/
  date: 17 June 2026, 3 PM
  content: |
    In the upcoming online EHRI webinar, Aneta Plzáková and Maria Dermentzi will present the current state of development of the EHRI-CZ Portal. The Portal connects Holocaust-related data from various institutions and addresses challenges such as multilingualism and metadata standards.

- title: "C4DHI Anniversary Workshop"
  url: /en/news/c4dhi-anniversary-workshop/
  date: 1-2 June 2026
  content: |
    We would like to invite you to a two-day workshop celebrating the third anniversary of the Centre for Digital Humanities Integration (C4DHI). The event will take place at the Jinonice Campus.

- title: "Lecture by Jan Láníček | Holocaust Survivors and Postwar Retribution"
  url: /en/news/lecture-jan-lanicek/
  date: 1 June 2026, 6 PM
  content: |
    We would like to invite you to a lecture by Jan Láníček. It is a part of the series Trends in Contemporary Holocaust Research, organized by EHRI-CZ in collaboration with the Jewish Museum in Prague.

- title: "Conny Kristel Fellowship"
  url: https://www.ehri-project.eu/conny-kristel-fellowships/
  content: |
    The second call for the Conny Kristel Fellowship (under EHRI-ERIC) is now open. The fellowship offers researchers access to 25 collection-holding institutions across Europe, Israel, and the U.S. Applications can be submitted until June 7 (midnight CET).