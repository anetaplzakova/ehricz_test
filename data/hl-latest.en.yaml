- title: "Lecture by Jan Láníček | Holocaust Survivors and Postwar Retribution"
  url: /en/news/lecture-jan-lanicek/
  date: 1 June 2026, 6 PM
  content: |
    We would like to invite you to a lecture by Jan Láníček. It is a part of the series Trends in Contemporary Holocaust Research, organized by EHRI-CZ in collaboration with the Jewish Museum in Prague.

- title: "The EHRI Czech National Node Welcomes Its First 2026 EHRI-ERIC Conny Kristel Fellow"
  url: /en/news/ehri-eric-conny-kristel-fellowship-leonie-rogg/
  content: |
    Leonie Rogg will begin her research stay on Monday, 27 May, at the Archives of the Jewish Museum in Prague and will move to the Czech National Archives in June.

- title: "Conny Kristel Fellowship"
  url: https://www.ehri-project.eu/conny-kristel-fellowships/
  content: |
    The second call for the Conny Kristel Fellowship (under EHRI-ERIC) is now open. The fellowship offers researchers access to 25 collection-holding institutions across Europe, Israel, and the U.S. Applications can be submitted until June 7 (midnight CET).

- title: "Guided Walk with MemoMap in Prague 7"
  url: /en/news/guided-walk-memomap-prague-7/
  date: 19 May 2026, 4pm
  content: |
    Join us for a walk through Prague 7, during which we will introduce you to the [MemoMap Prague](https://memomap.cz) application. The walk is free of charge, meeting point at Mama Shelter hotel.

- title: "Exhibition at Little Mehrin | Otte Wallish: From Znojmo to Tel Avivu"
  url: /en/news/vystava-otte-wallish/
  date: 30 March 2026, 6pm
  content: |
    The Malý Mehrin Museum will host the opening of the exhibition Otte Wallish: From Znojmo to Tel Aviv prepared by Eva Janáčová. The exhibition will be on display until the end of August 2026.

